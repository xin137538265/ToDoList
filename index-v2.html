<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList Widget - 重新设计</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --primary-light: #8B85FF;
            --primary-dark: #5548E8;
            --accent: #FF6B8A;
            --success: #4ECB71;
            --warning: #FFB74D;
            --danger: #FF5252;
            --bg-dark: #1A1A2E;
            --bg-medium: #16213E;
            --bg-light: #0F3460;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 50%, var(--bg-light) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(108, 99, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 138, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(78, 203, 113, 0.08) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .app-logo::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: logoShine 3s ease-in-out infinite;
        }

        @keyframes logoShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .app-logo svg {
            width: 40px;
            height: 40px;
            fill: white;
            position: relative;
            z-index: 1;
        }

        .app-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .widget-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            animation: slideUp 0.8s ease-out;
            animation-fill-mode: both;
        }

        .widget-card:nth-child(2) { animation-delay: 0.1s; }
        .widget-card:nth-child(3) { animation-delay: 0.2s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .widget-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-title-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .settings-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        .todo-input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
        }

        .todo-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .todo-input::placeholder {
            color: var(--text-muted);
        }

        .todo-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }

        .add-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .add-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
        }

        .filter-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border-color: transparent;
        }

        .filter-btn .count {
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .filter-btn.active .count {
            background: rgba(255, 255, 255, 0.3);
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .todo-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            animation: todoSlideIn 0.4s ease-out;
            cursor: grab;
        }

        @keyframes todoSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .todo-checkbox:hover {
            border-color: var(--primary);
        }

        .todo-checkbox.checked {
            background: linear-gradient(135deg, var(--success) 0%, #3DB862 100%);
            border-color: var(--success);
        }

        .todo-checkbox.checked svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-text {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .todo-description {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 4px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .todo-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .todo-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .todo-time svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .todo-priority {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high {
            background: rgba(255, 82, 82, 0.2);
            color: var(--danger);
        }

        .priority-medium {
            background: rgba(255, 183, 77, 0.2);
            color: var(--warning);
        }

        .priority-low {
            background: rgba(78, 203, 113, 0.2);
            color: var(--success);
        }

        .todo-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: var(--transition);
        }

        .todo-item:hover .todo-actions {
            opacity: 1;
        }

        .action-icon-btn {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .action-icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-icon-btn.edit:hover {
            background: rgba(108, 99, 255, 0.2);
        }

        .action-icon-btn.delete:hover {
            background: rgba(255, 82, 82, 0.2);
        }

        .action-icon-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--text-secondary);
        }

        .action-icon-btn.edit svg {
            fill: var(--primary);
        }

        .action-icon-btn.delete svg {
            fill: var(--danger);
        }

        /* 详情浮层 */
        .todo-tooltip {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 16px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .todo-item:hover .todo-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .tooltip-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .tooltip-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .tooltip-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tooltip-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tooltip-meta-item svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* 设置面板 */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .settings-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .settings-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 320px;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-medium) 100%);
            border-left: 1px solid var(--glass-border);
            padding: 24px;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .settings-panel.active {
            transform: translateX(0);
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .settings-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-title svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        .settings-close {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .settings-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .settings-close svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .settings-section {
            margin-bottom: 28px;
        }

        .settings-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
        }

        .setting-label {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .setting-value {
            font-weight: 700;
            color: var(--primary);
            font-family: 'Caveat', cursive;
        }

        .transparency-control {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-container {
            position: relative;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .slider-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 4px;
            transition: width 0.1s ease;
        }

        .slider-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            margin: 0;
        }

        .slider-thumb {
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            pointer-events: none;
        }

        .slider-thumb::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .transparency-presets {
            display: flex;
            gap: 8px;
        }

        .preset-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .preset-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-color: transparent;
            color: white;
        }

        /* 编辑面板 */
        .edit-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .edit-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .edit-panel {
            width: 90%;
            max-width: 420px;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-medium) 100%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .edit-overlay.active .edit-panel {
            transform: scale(1);
        }

        .edit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .edit-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .edit-close {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .edit-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .edit-close svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .form-select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
            -webkit-appearance: none;
        }

        .form-select:focus {
            border-color: var(--primary);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-card {
            text-align: center;
            padding: 20px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .stat-card.active {
            border-color: var(--primary);
            background: rgba(108, 99, 255, 0.15);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Caveat', cursive;
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            fill: rgba(255, 255, 255, 0.2);
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 30px 16px;
            }

            .app-title {
                font-size: 1.6rem;
            }

            .widget-card {
                padding: 20px;
            }

            .todo-input-container {
                flex-direction: column;
            }

            .add-btn {
                justify-content: center;
            }

            .settings-panel {
                width: 100%;
            }
        }
    </style>
</head>

    <script>
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('todos')) || [];
                this.opacity = parseInt(localStorage.getItem('opacity')) || 85;
                this.filter = 'all';
                this.editingTodo = null;
                this.init();
            }

            init() {
                this.cacheElements();
                this.bindEvents();
                this.updateSlider();
                this.renderTodos();
                this.updateStats();
                this.applyOpacity();
            }

            cacheElements() {
                this.opacitySlider = document.getElementById('opacitySlider');
                this.opacityValue = document.getElementById('opacityValue');
                this.sliderFill = document.getElementById('sliderFill');
                this.sliderThumb = document.getElementById('sliderThumb');
                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
                this.emptyState = document.getElementById('emptyState');
                this.totalCount = document.getElementById('totalCount');
                this.completedCount = document.getElementById('completedCount');
                this.pendingCount = document.getElementById('pendingCount');
                this.presetBtns = document.querySelectorAll('.preset-btn');
                this.settingsBtn = document.getElementById('settingsBtn');
                this.settingsPanel = document.getElementById('settingsPanel');
                this.settingsOverlay = document.getElementById('settingsOverlay');
                this.settingsClose = document.getElementById('settingsClose');
                this.editOverlay = document.getElementById('editOverlay');
                this.editClose = document.getElementById('editClose');
                this.editCancel = document.getElementById('editCancel');
                this.editSave = document.getElementById('editSave');
                this.editPanelTitle = document.getElementById('editPanelTitle');
                this.editTitle = document.getElementById('editTitle');
                this.editDescription = document.getElementById('editDescription');
                this.editPriority = document.getElementById('editPriority');
                this.filterBtns = document.querySelectorAll('.filter-btn');
                this.statCards = document.querySelectorAll('.stat-card');
            }

            bindEvents() {
                this.opacitySlider.addEventListener('input', (e) => this.handleOpacityChange(e));
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });

                this.presetBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const opacity = parseInt(e.target.dataset.opacity);
                        this.opacitySlider.value = opacity;
                        this.handleOpacityChange({ target: this.opacitySlider });
                    });
                });

                this.settingsBtn.addEventListener('click', () => this.openSettings());
                this.settingsClose.addEventListener('click', () => this.closeSettings());
                this.settingsOverlay.addEventListener('click', () => this.closeSettings());

                this.editClose.addEventListener('click', () => this.closeEdit());
                this.editCancel.addEventListener('click', () => this.closeEdit());
                this.editOverlay.addEventListener('click', (e) => {
                    if (e.target === this.editOverlay) this.closeEdit();
                });
                this.editSave.addEventListener('click', () => this.saveEdit());

                this.filterBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const filter = e.currentTarget.dataset.filter;
                        this.setFilter(filter);
                    });
                });

                this.statCards.forEach(card => {
                    card.addEventListener('click', (e) => {
                        const stat = e.currentTarget.dataset.stat;
                        this.setFilter(stat === 'all' ? 'all' : stat === 'completed' ? 'completed' : 'pending');
                    });
                });
            }

            handleOpacityChange(e) {
                this.opacity = parseInt(e.target.value);
                this.opacityValue.textContent = this.opacity + '%';
                this.updateSlider();
                this.applyOpacity();
                localStorage.setItem('opacity', this.opacity);

                this.presetBtns.forEach(btn => {
                    btn.classList.toggle('active', parseInt(btn.dataset.opacity) === this.opacity);
                });
            }

            updateSlider() {
                const percentage = ((this.opacity - 20) / (100 - 20)) * 100;
                this.sliderFill.style.width = percentage + '%';
                this.sliderThumb.style.left = percentage + '%';
            }

            applyOpacity() {
                document.querySelectorAll('.widget-card').forEach(card => {
                    card.style.opacity = this.opacity / 100;
                });
            }

            openSettings() {
                this.settingsPanel.classList.add('active');
                this.settingsOverlay.classList.add('active');
            }

            closeSettings() {
                this.settingsPanel.classList.remove('active');
                this.settingsOverlay.classList.remove('active');
            }

            openEdit(todo = null) {
                this.editingTodo = todo;
                if (todo) {
                    this.editPanelTitle.textContent = '编辑待办事项';
                    this.editTitle.value = todo.text;
                    this.editDescription.value = todo.description || '';
                    this.editPriority.value = todo.priority || 'medium';
                } else {
                    this.editPanelTitle.textContent = '新建待办事项';
                    this.editTitle.value = '';
                    this.editDescription.value = '';
                    this.editPriority.value = 'medium';
                }
                this.editOverlay.classList.add('active');
            }

            closeEdit() {
                this.editOverlay.classList.remove('active');
                this.editingTodo = null;
            }

            saveEdit() {
                const title = this.editTitle.value.trim();
                if (!title) {
                    alert('请输入标题');
                    return;
                }

                if (this.editingTodo) {
                    const todo = this.todos.find(t => t.id === this.editingTodo.id);
                    if (todo) {
                        todo.text = title;
                        todo.description = this.editDescription.value.trim();
                        todo.priority = this.editPriority.value;
                    }
                } else {
                    this.addTodoFromEdit(title, this.editDescription.value.trim(), this.editPriority.value);
                }

                this.saveTodos();
                this.renderTodos();
                this.updateStats();
                this.closeEdit();
            }

            addTodoFromEdit(title, description, priority) {
                const todo = {
                    id: Date.now(),
                    text: title,
                    description: description,
                    completed: false,
                    createdAt: new Date().toLocaleString('zh-CN'),
                    priority: priority
                };
                this.todos.unshift(todo);
            }

            addTodo() {
                const text = this.todoInput.value.trim();
                if (!text) {
                    return;
                }

                const todo = {
                    id: Date.now(),
                    text,
                    description: '',
                    completed: false,
                    createdAt: new Date().toLocaleString('zh-CN'),
                    priority: 'medium'
                };

                this.todos.unshift(todo);
                this.saveTodos();
                this.renderTodos();
                this.updateStats();
                this.todoInput.value = '';
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveTodos();
                    this.renderTodos();
                    this.updateStats();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.saveTodos();
                this.renderTodos();
                this.updateStats();
            }

            setFilter(filter) {
                this.filter = filter;
                
                this.filterBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });

                this.statCards.forEach(card => {
                    const statFilter = card.dataset.stat === 'all' ? 'all' : card.dataset.stat;
                    card.classList.toggle('active', statFilter === filter);
                });

                this.renderTodos();
            }

            getFilteredTodos() {
                if (this.filter === 'completed') {
                    return this.todos.filter(t => t.completed);
                } else if (this.filter === 'pending') {
                    return this.todos.filter(t => !t.completed);
                }
                return this.todos;
            }

            saveTodos() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
            }

            renderTodos() {
                const filteredTodos = this.getFilteredTodos();
                
                if (filteredTodos.length === 0) {
                    this.emptyState.style.display = 'block';
                    this.todoList.innerHTML = '';
                    this.todoList.appendChild(this.emptyState);
                    return;
                }

                this.emptyState.style.display = 'none';
                this.todoList.innerHTML = filteredTodos.map(todo => this.createTodoHTML(todo)).join('');

                this.todoList.querySelectorAll('.todo-item').forEach(item => {
                    const id = parseInt(item.dataset.id);
                    
                    item.querySelector('.todo-checkbox').addEventListener('click', () => {
                        this.toggleTodo(id);
                    });

                    item.querySelector('.edit-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        const todo = this.todos.find(t => t.id === id);
                        this.openEdit(todo);
                    });

                    item.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteTodo(id);
                    });

                    item.addEventListener('dblclick', () => {
                        const todo = this.todos.find(t => t.id === id);
                        this.openEdit(todo);
                    });
                });
            }

            createTodoHTML(todo) {
                const priorityLabel = {
                    'high': '高',
                    'medium': '中',
                    'low': '低'
                }[todo.priority || 'medium'];

                const priorityClass = `priority-${todo.priority || 'medium'}`;

                return `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                        <div class="todo-checkbox ${todo.completed ? 'checked' : ''}">
                            ${todo.completed ? '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : ''}
                        </div>
                        <div class="todo-content">
                            <div class="todo-text">${this.escapeHtml(todo.text)}</div>
                            ${todo.description ? `<div class="todo-description">${this.escapeHtml(todo.description)}</div>` : ''}
                            <div class="todo-meta">
                                <span class="todo-time">
                                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                    ${todo.createdAt}
                                </span>
                                <span class="todo-priority ${priorityClass}">${priorityLabel}</span>
                            </div>
                        </div>
                        <div class="todo-actions">
                            <button class="action-icon-btn edit edit-btn">
                                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            </button>
                            <button class="action-icon-btn delete delete-btn">
                                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            </button>
                        </div>
                        <div class="todo-tooltip">
                            <div class="tooltip-title">${this.escapeHtml(todo.text)}</div>
                            ${todo.description ? `<div class="tooltip-description">${this.escapeHtml(todo.description)}</div>` : '<div class="tooltip-description">暂无详细描述</div>'}
                            <div class="tooltip-meta">
                                <div class="tooltip-meta-item">
                                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                    ${todo.createdAt}
                                </div>
                                <div class="tooltip-meta-item">
                                    <span class="todo-priority ${priorityClass}">${priorityLabel}优先级</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            updateStats() {
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const pending = total - completed;

                this.totalCount.textContent = total;
                this.completedCount.textContent = completed;
                this.pendingCount.textContent = pending;

                document.getElementById('filterAllCount').textContent = total;
                document.getElementById('filterPendingCount').textContent = pending;
                document.getElementById('filterCompletedCount').textContent = completed;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TodoApp();
        });
    </script>
</body>
</html>
