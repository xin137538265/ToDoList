<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>透明待办事项 - TodoList Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --primary-light: #8B85FF;
            --primary-dark: #5548E8;
            --accent: #FF6B8A;
            --success: #4ECB71;
            --warning: #FFB74D;
            --danger: #FF5252;
            --bg-dark: #1A1A2E;
            --bg-medium: #16213E;
            --bg-light: #0F3460;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 50%, var(--bg-light) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(108, 99, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 138, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(78, 203, 113, 0.08) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .app-logo::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: logoShine 3s ease-in-out infinite;
        }

        @keyframes logoShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .app-logo svg {
            width: 40px;
            height: 40px;
            fill: white;
            position: relative;
            z-index: 1;
        }

        .app-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .widget-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            animation: slideUp 0.8s ease-out;
            animation-fill-mode: both;
        }

        .widget-card:nth-child(2) { animation-delay: 0.1s; }
        .widget-card:nth-child(3) { animation-delay: 0.2s; }
        .widget-card:nth-child(4) { animation-delay: 0.3s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .widget-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-title-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .transparency-control {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transparency-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .transparency-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Caveat', cursive;
        }

        .transparency-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .slider-container {
            position: relative;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .slider-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 4px;
            transition: width 0.1s ease;
        }

        .slider-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            margin: 0;
        }

        .slider-thumb {
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            pointer-events: none;
        }

        .slider-thumb::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .transparency-presets {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .preset-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .preset-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-color: transparent;
            color: white;
        }

        .todo-input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .todo-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .todo-input::placeholder {
            color: var(--text-muted);
        }

        .todo-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }

        .add-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .add-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            animation: todoSlideIn 0.4s ease-out;
            cursor: grab;
        }

        @keyframes todoSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .todo-item.dragging {
            opacity: 0.5;
            transform: scale(1.02);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .todo-checkbox:hover {
            border-color: var(--primary);
        }

        .todo-checkbox.checked {
            background: linear-gradient(135deg, var(--success) 0%, #3DB862 100%);
            border-color: var(--success);
        }

        .todo-checkbox.checked svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-text {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .todo-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
        }

        .todo-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .todo-time svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .todo-priority {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high {
            background: rgba(255, 82, 82, 0.2);
            color: var(--danger);
        }

        .priority-medium {
            background: rgba(255, 183, 77, 0.2);
            color: var(--warning);
        }

        .priority-low {
            background: rgba(78, 203, 113, 0.2);
            color: var(--success);
        }

        .todo-delete {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .todo-item:hover .todo-delete {
            opacity: 1;
        }

        .todo-delete:hover {
            background: rgba(255, 82, 82, 0.2);
        }

        .todo-delete svg {
            width: 14px;
            height: 14px;
            fill: var(--danger);
        }

        .todo-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-item {
            text-align: center;
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Caveat', cursive;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            fill: rgba(255, 255, 255, 0.2);
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 30px 16px;
            }

            .app-title {
                font-size: 1.6rem;
            }

            .widget-card {
                padding: 20px;
            }

            .todo-input-container {
                flex-direction: column;
            }

            .add-btn {
                justify-content: center;
            }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-md);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: notifSlideIn 0.4s ease-out;
            max-width: 320px;
        }

        @keyframes notifSlideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notification.success {
            border-left: 4px solid var(--success);
        }

        .notification.error {
            border-left: 4px solid var(--danger);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .notification.success .notification-icon {
            background: rgba(78, 203, 113, 0.2);
        }

        .notification.error .notification-icon {
            background: rgba(255, 82, 82, 0.2);
        }

        .notification-icon svg {
            width: 14px;
            height: 14px;
        }

        .notification.success .notification-icon svg {
            fill: var(--success);
        }

        .notification.error .notification-icon svg {
            fill: var(--danger);
        }

        .notification-text {
            font-size: 0.9rem;
            color: #333;
        }

        .notification.hiding {
            animation: notifSlideOut 0.3s ease-in forwards;
        }

        @keyframes notifSlideOut {
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </div>
            <h1 class="app-title">TodoList Widget</h1>
            <p class="app-subtitle">透明待办事项 · 桌面插件</p>
        </header>

        <div class="widget-card">
            <div class="card-header">
                <h2 class="card-title">
                    <span class="card-title-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </span>
                    透明度调节
                </h2>
            </div>
            <div class="transparency-control">
                <div class="transparency-display">
                    <div>
                        <div class="transparency-value" id="opacityValue">85%</div>
                        <div class="transparency-label">当前透明度</div>
                    </div>
                </div>
                <div class="slider-container" id="sliderContainer">
                    <div class="slider-fill" id="sliderFill"></div>
                    <input type="range" class="slider-input" id="opacitySlider" min="20" max="100" value="85">
                    <div class="slider-thumb" id="sliderThumb"></div>
                </div>
                <div class="transparency-presets">
                    <button class="preset-btn" data-opacity="30">30%</button>
                    <button class="preset-btn" data-opacity="50">50%</button>
                    <button class="preset-btn active" data-opacity="85">85%</button>
                    <button class="preset-btn" data-opacity="100">100%</button>
                </div>
            </div>
        </div>

        <div class="widget-card">
            <div class="card-header">
                <h2 class="card-title">
                    <span class="card-title-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                    </span>
                    添加待办
                </h2>
            </div>
            <div class="todo-input-container">
                <input type="text" class="todo-input" id="todoInput" placeholder="输入待办事项...">
                <button class="add-btn" id="addBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    添加
                </button>
            </div>
            <div class="todo-list" id="todoList">
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    <h3 class="empty-state-title">暂无待办事项</h3>
                    <p class="empty-state-text">添加你的第一个待办事项开始吧！</p>
                </div>
            </div>
        </div>

        <div class="widget-card">
            <div class="card-header">
                <h2 class="card-title">
                    <span class="card-title-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                        </svg>
                    </span>
                    统计信息
                </h2>
            </div>
            <div class="todo-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总计</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="completedCount">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">待完成</div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>TodoList Widget · 桌面待办事项插件设计方案</p>
        </footer>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('todos')) || [];
                this.opacity = parseInt(localStorage.getItem('opacity')) || 85;
                this.init();
            }

            init() {
                this.cacheElements();
                this.bindEvents();
                this.updateSlider();
                this.renderTodos();
                this.updateStats();
                this.applyOpacity();
            }

            cacheElements() {
                this.opacitySlider = document.getElementById('opacitySlider');
                this.opacityValue = document.getElementById('opacityValue');
                this.sliderFill = document.getElementById('sliderFill');
                this.sliderThumb = document.getElementById('sliderThumb');
                this.sliderContainer = document.getElementById('sliderContainer');
                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
                this.emptyState = document.getElementById('emptyState');
                this.totalCount = document.getElementById('totalCount');
                this.completedCount = document.getElementById('completedCount');
                this.pendingCount = document.getElementById('pendingCount');
                this.presetBtns = document.querySelectorAll('.preset-btn');
            }

            bindEvents() {
                this.opacitySlider.addEventListener('input', (e) => this.handleOpacityChange(e));
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });

                this.presetBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const opacity = parseInt(e.target.dataset.opacity);
                        this.opacitySlider.value = opacity;
                        this.handleOpacityChange({ target: this.opacitySlider });
                    });
                });
            }

            handleOpacityChange(e) {
                this.opacity = parseInt(e.target.value);
                this.opacityValue.textContent = this.opacity + '%';
                this.updateSlider();
                this.applyOpacity();
                localStorage.setItem('opacity', this.opacity);

                this.presetBtns.forEach(btn => {
                    btn.classList.toggle('active', parseInt(btn.dataset.opacity) === this.opacity);
                });
            }

            updateSlider() {
                const percentage = ((this.opacity - 20) / (100 - 20)) * 100;
                this.sliderFill.style.width = percentage + '%';
                this.sliderThumb.style.left = percentage + '%';
            }

            applyOpacity() {
                document.querySelectorAll('.widget-card').forEach(card => {
                    card.style.opacity = this.opacity / 100;
                });
            }

            addTodo() {
                const text = this.todoInput.value.trim();
                if (!text) {
                    this.showNotification('请输入待办事项内容', 'error');
                    return;
                }

                const todo = {
                    id: Date.now(),
                    text,
                    completed: false,
                    createdAt: new Date().toLocaleString('zh-CN'),
                    priority: 'medium'
                };

                this.todos.unshift(todo);
                this.saveTodos();
                this.renderTodos();
                this.updateStats();
                this.todoInput.value = '';
                this.showNotification('待办事项已添加', 'success');
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveTodos();
                    this.renderTodos();
                    this.updateStats();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.saveTodos();
                this.renderTodos();
                this.updateStats();
                this.showNotification('待办事项已删除', 'success');
            }

            saveTodos() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
            }

            renderTodos() {
                if (this.todos.length === 0) {
                    this.emptyState.style.display = 'block';
                    this.todoList.innerHTML = '';
                    this.todoList.appendChild(this.emptyState);
                    return;
                }

                this.emptyState.style.display = 'none';
                this.todoList.innerHTML = this.todos.map(todo => this.createTodoHTML(todo)).join('');

                this.todoList.querySelectorAll('.todo-item').forEach(item => {
                    const id = parseInt(item.dataset.id);
                    
                    item.querySelector('.todo-checkbox').addEventListener('click', () => {
                        this.toggleTodo(id);
                    });

                    item.querySelector('.todo-delete').addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteTodo(id);
                    });
                });
            }

            createTodoHTML(todo) {
                return `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                        <div class="todo-checkbox ${todo.completed ? 'checked' : ''}">
                            ${todo.completed ? '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : ''}
                        </div>
                        <div class="todo-content">
                            <div class="todo-text">${this.escapeHtml(todo.text)}</div>
                            <div class="todo-meta">
                                <span class="todo-time">
                                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                    ${todo.createdAt}
                                </span>
                            </div>
                        </div>
                        <button class="todo-delete">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </div>
                `;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            updateStats() {
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const pending = total - completed;

                this.totalCount.textContent = total;
                this.completedCount.textContent = completed;
                this.pendingCount.textContent = pending;
            }

            showNotification(message, type = 'success') {
                const existing = document.querySelector('.notification');
                if (existing) existing.remove();

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.innerHTML = `
                    <div class="notification-icon">
                        ${type === 'success' 
                            ? '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
                            : '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'
                        }
                    </div>
                    <div class="notification-text">${message}</div>
                `;

                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.classList.add('hiding');
                    setTimeout(() => notification.remove(), 300);
                }, 2500);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TodoApp();
        });
    </script>
</body>
</html>
